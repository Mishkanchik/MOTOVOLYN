<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог мотоциклів — Motovolyn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-zinc-950 text-white">

    <!-- HEADER (однаковий) -->
    <header class="sticky top-0 z-50 bg-zinc-950 border-b border-zinc-800 shadow-2xl">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-4 group">
                <img src="./images/download.avif" alt="Motovolyn Logo"
                    class="h-14 w-auto drop-shadow-2xl group-hover:scale-105 transition-transform">
                <div class="text-4xl font-bold tracking-[-3px] leading-none"
                    style="font-family: 'Space Grotesk', sans-serif;">
                    MOTOVOLYN
                </div>
            </a>

            <nav class="hidden md:flex items-center gap-10 text-lg font-medium">
                <a href="index.html">Головна</a>
                <a href="catalog.html">Каталог</a>
                <a href="index.html#about">Про нас</a>
                <a href="index.html#salon">Мотосалон</a>
                <a href="index.html#contacts">Контакти</a>
            </nav>

            <div class="flex items-center gap-4">
                <a href="tel:+380965562288"
                    class="hidden sm:flex items-center gap-3 bg-emerald-500 hover:bg-emerald-600 text-black font-semibold px-8 py-4 rounded-3xl text-sm uppercase tracking-widest shadow-lg shadow-emerald-500/40 transition-all">
                    <i class="fa-solid fa-phone"></i> ЗАТЕЛЕФОНУВАТИ
                </a>
                <button onclick="toggleMobileMenu()" class="md:hidden w-12 h-12 text-3xl">
                    <i id="hamburger" class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-zinc-900 border-t border-zinc-800 px-6 py-8">
            <div class="flex flex-col gap-6 text-xl font-medium">
                <a href="index.html" onclick="toggleMobileMenu()">Головна</a>
                <a href="catalog.html" onclick="toggleMobileMenu()">Каталог</a>
                <a href="index.html#about" onclick="toggleMobileMenu()">Про нас</a>
                <a href="index.html#salon" onclick="toggleMobileMenu()">Мотосалон</a>
                <a href="index.html#contacts" onclick="toggleMobileMenu()">Контакти</a>
                <a href="tel:+380965562288"
                    class="mt-6 bg-emerald-500 text-black py-5 text-center rounded-3xl font-semibold text-xl flex items-center justify-center gap-3">
                    <i class="fa-solid fa-phone"></i> ЗАТЕЛЕФОНУВАТИ ЗАРАЗ
                </a>
            </div>
        </div>
    </header>

    <section class="pt-12 pb-24">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-6xl font-bold tracking-tighter text-center mb-4"
                style="font-family: 'Space Grotesk', sans-serif;">
                КАТАЛОГ МОТОЦИКЛІВ
            </h1>
            <p class="text-center text-2xl text-zinc-400 mb-12">150+ моделей • Нові та вживані</p>

            <!-- Фільтри -->
            <div class="flex flex-wrap gap-4 mb-12 justify-center">
                <button onclick="filterCategory('all')"
                    class="filter-btn active px-6 py-3 bg-emerald-500 text-black rounded-3xl font-medium">Усі</button>
                <button onclick="filterCategory('enduro')"
                    class="filter-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-medium">Enduro /
                    Крос</button>
                <button onclick="filterCategory('naked')"
                    class="filter-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-medium">Naked /
                    Street</button>
                <button onclick="filterCategory('adventure')"
                    class="filter-btn px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl font-medium">Adventure</button>
            </div>

            <div id="catalog-grid" class="grid md:grid-cols-3 lg:grid-cols-4 gap-8">
                <!-- Заповнюється через JS -->
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
